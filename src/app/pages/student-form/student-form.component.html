<div class="card m-3">
  <h5 class="card-header">
    {{ isEditMode ? 'Edit Student' : 'Add Student' }}
  </h5>
  <div class="card-body">
    <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" formControlName="firstName" class="form-control"
          [ngClass]="{ 'is-invalid': submitted&& form['firstName'].errors }"/>
        @if (submitted && form['firstName'].errors) {
          <div class="invalid-feedback">First Name is required</div>
        }
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" formControlName="lastName" class="form-control"
          [ngClass]="{ 'is-invalid': submitted&& form['lastName'].errors }"/>
        @if (submitted && form['lastName'].errors) {
          <div class="invalid-feedback">Last Name is required</div>
        }
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" formControlName="email" class="form-control"
          [ngClass]="{ 'is-invalid': submitted&& form['email'].errors }"/>
        @if (submitted && form['email'].errors) {
          <div class="invalid-feedback">Email is required</div>
        }
      </div>
      <div class="text-center mt-3">
        <button class="btn btn-primary mr-2">
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
        <a routerLink="/students" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
